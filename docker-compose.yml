version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nse_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in the environment}
    ports:
      - "${DB_PORT_EXTERNAL:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nse_backend
    restart: always
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=nse_subscription
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in the environment}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in the environment}
      - MSG91_AUTH_KEY=${MSG91_AUTH_KEY:?MSG91_AUTH_KEY must be set in the environment}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:?RAZORPAY_KEY_ID must be set in the environment}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:?RAZORPAY_KEY_SECRET must be set in the environment}
      - PREMIUM_COUPON_100=${PREMIUM_COUPON_100:-PUREFRAME100}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: nse_bot
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=nse_ingestion
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in the environment}
      - DB_NAME_SUB=nse_subscription
      - SCRAPER_BASE_PATH=/app
      - ENABLE_DB_WATCHER=${ENABLE_DB_WATCHER:-True}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:?WHATSAPP_TOKEN must be set in the environment}
      - PHONE_NUMBER_ID=${PHONE_NUMBER_ID:-1094754613731490}
      - VERIFY_TOKEN=${VERIFY_TOKEN:-nse_bot_secret_2024}
      - FLASK_PORT=5000
      - BOT_DB_PATH=/app/bot_sqlite/bot_data.db
      - PORTAL_URL=${PORTAL_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Branded short download links (equityalerts.in/t/<code>). Must be the public
      # origin that reaches this bot; set "" to fall back to raw NSE URLs.
      - SHORTLINK_BASE=${SHORTLINK_BASE:-https://equityalerts.in}
    ports:
      - "5000:5000"
    volumes:
      - shared_storage:/app/storage
      - bot_sqlite_data:/app/bot_sqlite
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: nse_scraper
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=nse_ingestion
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in the environment}
      # NOTE: the scraper is fully subscription-driven — it scrapes ONLY the
      # companies that currently have >=1 active subscription (via
      # symbolProvider -> subscribedCompanyRepository, refreshed every ~20s).
      # No static SYMBOLS list is used at runtime, so none is set here.
      - INTERVAL=${POLL_INTERVAL_MS:-20000}
      - MAX_RECORDS=${MAX_RECORDS:-10}
      - REQUEST_LIMIT=${REQUEST_LIMIT:-5}
      - DOWNLOAD_WORKERS=${DOWNLOAD_WORKERS:-10}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-5000}
      - MAX_PENDING_JOBS=${MAX_PENDING_JOBS:-10000}
      - MARKET_START=${MARKET_START:-8}
      - MARKET_END=${MARKET_END:-18}
      - PDF_STORAGE_PATH=/app/storage/pdf
    volumes:
      - shared_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started

  adminer:
    image: adminer
    container_name: nse_adminer
    restart: always
    environment:
      - SERVICE_FQDN_ADMINER_8080
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  metabase:
    image: metabase/metabase
    container_name: nse_metabase
    restart: always
    environment:
      - SERVICE_FQDN_METABASE_3000
      - MB_DB_FILE=/metabase-data/metabase.db
    expose:
      - "3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  shared_storage:
  bot_sqlite_data:
  metabase_data:
